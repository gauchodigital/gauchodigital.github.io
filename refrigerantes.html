<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <title>Refrigerantes - Mannol Argentina | Tips</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="/css/global.css" rel="stylesheet" />
  <link href="/css/header.css" rel="stylesheet" />
  <link href="/css/footer.css" rel="stylesheet" />
  <link href="/css/productos.css" rel="stylesheet" />
</head>
<body>
  <div id="header"></div>

  <!-- Banner -->
  <section class="banner-productos d-flex align-items-center">
    <div class="container">
      <div class="row">
        <div class="col-md-12 text-start">
          <h1 class="titulo-banner">Refrigerantes</h1>
          <!-- Puedes dejar el subtítulo en blanco o agregar uno si lo deseas -->
          <!-- <p class="subtitulo-banner">[Subtítulo opcional]</p> -->
        </div>
      </div>
    </div>
  </section>

  <!-- Menú de Categorías -->
  <section class="productos-container">
    <div class="container">
      <ul class="productos-menu">
        <li><a class="active" data-filter="all" href="#">Todos</a></li>
      </ul>
    </div>
  </section>

  <!-- Listado de Productos -->
  <section class="productos-container">
    <div class="container">
      <div class="row productos-lista">
        <!-- Producto 1: Antifreeze AF 12+ (Rojo) -->
        <div class="col-6 col-md-3 producto-item mb-4" data-category="pf-mineral">
          <div class="producto">
            <span class="etiqueta">1L - 20L</span>
            <div class="producto-imagen">
              <a href="#"><img alt="Antifreeze AF 12+ 1Lt" src="img-shop/4112.jpg" /></a>
              <a href="#"><img alt="Antifreeze AF 12+ 20Lts" src="img-shop/4112-20.jpg" /></a>
              <div class="sale-flash">1L - 20L</div>
              <div class="product-overlay"></div>
            </div>
            <h4 class="producto-titulo">Antifreeze concentrado</h4>
            <p class="producto-subtitulo">AF 12+ (Rojo)</p>
            <button class="producto-ficha" data-bs-target="#modalFicha" data-bs-toggle="modal" data-imagen="tecnica/4112.jpg">📄 Ficha Técnica</button>
          </div>
        </div>

        <!-- Producto 2: Antifreeze AG 13 Hightec (Verde) -->
        <div class="col-6 col-md-3 producto-item mb-4" data-category="pf-mineral">
          <div class="producto">
            <span class="etiqueta">1L</span>
            <div class="producto-imagen">
              <a href="#"><img alt="Antifreeze AG 13 Hightec 1Lt" src="img-shop/4113.jpg" /></a>
              <a href="#"><img alt="Antifreeze AG 13 Hightec 1Lt" src="img-shop/4113.jpg" /></a>
              <div class="sale-flash">1L</div>
              <div class="product-overlay"></div>
            </div>
            <h4 class="producto-titulo">Antifreeze concentrado</h4>
            <p class="producto-subtitulo">AG 13 Hightec (Verde)</p>
            <button class="producto-ficha" data-bs-target="#modalFicha" data-bs-toggle="modal" data-imagen="tecnica/4113.jpg">📄 Ficha Técnica</button>
          </div>
        </div>

        <!-- Producto 3: Antifreeze AG 13+ Advan. (Amarillo) -->
        <div class="col-6 col-md-3 producto-item mb-4" data-category="pf-mineral">
          <div class="producto">
            <span class="etiqueta">1L</span>
            <div class="producto-imagen">
              <a href="#"><img alt="Antifreeze AG 13+ Advan. 1Lt" src="img-shop/4114.jpg" /></a>
              <a href="#"><img alt="Antifreeze AG 13+ Advan. 1Lt" src="img-shop/4114.jpg" /></a>
              <div class="sale-flash">1L</div>
              <div class="product-overlay"></div>
            </div>
            <h4 class="producto-titulo">Antifreeze concentrado</h4>
            <p class="producto-subtitulo">AG 13+ Advan. (Amarillo)</p>
            <button class="producto-ficha" data-bs-target="#modalFicha" data-bs-toggle="modal" data-imagen="tecnica/4114.jpg">📄 Ficha Técnica</button>
          </div>
        </div>

        <!-- Producto 4: Antifreeze AG11 Longterm (Azul) -->
        <div class="col-6 col-md-3 producto-item mb-4" data-category="pf-mineral">
          <div class="producto">
            <span class="etiqueta">1L</span>
            <div class="producto-imagen">
              <a href="#"><img alt="Antifreeze AG11 Longterm 1Lt" src="img-shop/4111.jpg" /></a>
              <a href="#"><img alt="Antifreeze AG11 Longterm 1Lt" src="img-shop/4111.jpg" /></a>
              <div class="sale-flash">1L</div>
              <div class="product-overlay"></div>
            </div>
            <h4 class="producto-titulo">Antifreeze concentrado</h4>
            <p class="producto-subtitulo">AG11 Longterm (Azul)</p>
            <button class="producto-ficha" data-bs-target="#modalFicha" data-bs-toggle="modal" data-imagen="tecnica/4111.jpg">📄 Ficha Técnica</button>
          </div>
        </div>
      </div><!-- .productos-lista end -->
    </div>
  </section>

  <!-- Modal para Ficha Técnica -->
  <div aria-hidden="true" aria-labelledby="modalFichaLabel" class="modal fade" id="modalFicha" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="modalFichaLabel">Ficha Técnica</h5>
          <button aria-label="Close" class="btn-close" data-bs-dismiss="modal" type="button"></button>
        </div>
        <div class="modal-body text-center">
          <img alt="Ficha Técnica" class="img-fluid" id="imagenFicha" src="" />
        </div>
      </div>
    </div>
  </div>

  <div id="footer"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/Footer.js"></script>
  <script src="/js/header.js"></script>
  <script src="/js/global.js"></script>

</body>
</html>
