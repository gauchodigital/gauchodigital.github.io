<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <title>Contacto - Mannol Argentina</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="/css/global.css" rel="stylesheet" />
  <link href="/css/header.css" rel="stylesheet" />
  <link href="/css/footer.css" rel="stylesheet" />
  <link href="/css/contacto.css" rel="stylesheet" />
</head>
<body>
  <div id="header"></div> <!-- Carga el header -->

  <!-- 🔹 Banner de Productos -->
  <section class="banner-contacto d-flex align-items-center text-start">
    <div class="container-fluid p-5">
      <div class="row">
        <div class="col-md-12 text-start">
          <h1 class="titulo-banner text-uppercase">Contacto</h1>
          
        </div>
      </div>
    </div>
  </section>

  

  <div class="container-fluid text-center p-5 my-5">
    <h2 class="fw-bold text-uppercase titulo-arriba">Nos esforzamos por proporcionar</h2>
    <h2 class="fw-bold text-uppercase titulo-abajo">a nuestros clientes un soporte de primer nivel.</h2>
</div>
 

  <div class="container-fluid ">
    <div class="row">
        <!-- Columna Izquierda -->
        <div class="col-lg-6 px-5 pb-5 pb-lg-0">
            <!-- Formulario -->
            <form>
                <div class="mb-3">
                    <input type="text" class="form-control" placeholder="Nombre y apellido *" required>
                </div>
                <div class="mb-3">
                    <input type="email" class="form-control" placeholder="Email">
                </div>
                <div class="mb-3">
                    <input type="tel" class="form-control" placeholder="Número de teléfono *" required>
                </div>
                <div class="mb-3">
                    <textarea class="form-control" rows="8" placeholder="Mensaje"></textarea>
                </div>
                <button type="submit" class="btn btn-enviar">ENVIAR</button>
            </form>

            <!-- Información de Contacto -->
            <div class="container contact-info-container">
                <div class="row pt-5">
                    <!-- Columna Izquierda: Teléfono y Email -->
                    <div class="col-md-6 d-flex flex-column align-items-start">
                        <div class="d-flex align-items-center mb-4">
                            <img src="/imagenes/phone-contacto.png" alt="Teléfono" class="icono-contacto">
                            <span>11 3592 0668</span>
                        </div>
                        <div class="d-flex align-items-center mb-2">
                            <img src="/imagenes/email-contacto.png" alt="Email" class="icono-contacto">
                            <span>ventas@mannol.com.ar</span>
                        </div>
                    </div>
            
                    <!-- Columna Derecha: Dirección -->
                    <div class="col-md-6 d-flex align-items-start">
                        <img src="/imagenes/maps-contacto.png" alt="Ubicación" class="icono-contacto">
                        <span>
                            Boulogne Sur Mer 1833<br>
                            Villa Maipú, Buenos Aires<br>
                            CP 1650
                        </span>
                    </div>
                </div>
            </div>
            
            
        </div>

       
        <!-- Columna Derecha -->
        <div class="col-lg-6 img-container position-relative  px-5 pb-5">
            <img src="/imagenes/contacto-auto.png" class="img-fluid" alt="Auto de carreras">
            
            <!-- Imagen del fuego -->
            <img src="/imagenes/fuego-dercha.png" class="fuego-derecha" alt="Efecto de fuego">
        </div>
    </div>
</div>




  <div id="footer"></div> <!-- Carga el footer -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/footer.js"></script>
  <script src="/js/header.js"></script>
  <script src="/js/global.js"></script>

</body>
</html>
